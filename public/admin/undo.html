<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <title>Shubs · Undo recent changes</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Archivo:wght@600;700&family=Hanken+Grotesk:wght@400;500&family=Space+Mono&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg-primary: #efe9dc;
        --bg-card: #faf6ee;
        --bg-surface: #e6dece;
        --accent: #fc5f84;
        --accent-dim: #e23e69;
        --accent-ink: #bd1a57;
        --text-primary: #15120e;
        --text-secondary: #3d362b;
        --text-muted: rgba(21, 18, 14, 0.66);
        --border: rgba(21, 18, 14, 0.13);
        --ok-bg: #e7f1ee;
        --ok-border: rgba(26, 112, 80, 0.4);
        --ok-text: #1a7050;
        --err-bg: #fbeae6;
        --err-border: rgba(184, 77, 56, 0.4);
        --err-text: #b23a1f;
        --font-display: 'Archivo', -apple-system, system-ui, sans-serif;
        --font-body: 'Hanken Grotesk', -apple-system, system-ui, sans-serif;
        --font-mono: 'Space Mono', ui-monospace, monospace;
        --radius-md: 8px;
        --radius-lg: 16px;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        background: var(--bg-primary);
        color: var(--text-primary);
        font-family: var(--font-body);
        line-height: 1.5;
        -webkit-font-smoothing: antialiased;
      }
      .wrap { max-width: 760px; margin: 0 auto; padding: 2.5rem 1.25rem 4rem; }
      header.page { margin-bottom: 1.75rem; }
      .eyebrow {
        font-family: var(--font-mono);
        font-size: 0.72rem; letter-spacing: 0.12em; text-transform: uppercase;
        color: var(--accent-ink); font-weight: 400; margin: 0 0 0.5rem;
      }
      h1 {
        font-family: var(--font-display); font-weight: 700;
        font-size: 2.2rem; line-height: 1.04; letter-spacing: -0.02em; margin: 0 0 0.6rem;
      }
      .lede { color: var(--text-muted); margin: 0; max-width: 56ch; }
      .toolbar {
        display: flex; gap: 0.6rem; align-items: center; flex-wrap: wrap;
        margin: 1.5rem 0 1rem;
      }
      button, .btn {
        font-family: inherit; font-size: 0.875rem; font-weight: 500;
        border-radius: var(--radius-md); border: 1px solid var(--border);
        padding: 0.55rem 1rem; cursor: pointer; background: var(--bg-card);
        color: var(--text-primary); transition: all 0.15s ease;
        text-decoration: none; display: inline-flex; align-items: center; gap: 0.45rem;
      }
      button:hover, .btn:hover { border-color: var(--accent); color: var(--accent-ink); }
      button:disabled { opacity: 0.5; cursor: default; }
      .btn-primary {
        background: var(--accent); border-color: var(--accent); color: #fff;
      }
      .btn-primary:hover { background: var(--accent-dim); border-color: var(--accent-dim); color: #fff; }
      .btn-undo { border-color: var(--border); color: var(--text-secondary); }
      .btn-undo:hover { border-color: var(--accent); color: var(--accent-ink); background: #fff; }
      .spacer { flex: 1; }
      a.muted { color: var(--text-muted); font-size: 0.875rem; text-decoration: none; }
      a.muted:hover { color: var(--accent-ink); text-decoration: underline; }
      ul.changes { list-style: none; margin: 0; padding: 0; }
      li.change {
        background: var(--bg-card); border: 1px solid var(--border);
        border-radius: var(--radius-md); padding: 1rem 1.15rem; margin-bottom: 0.7rem;
        display: flex; gap: 1rem; align-items: flex-start;
      }
      .change .body { flex: 1; min-width: 0; }
      .change .what { font-weight: 500; font-size: 1.0625rem; margin: 0 0 0.15rem; }
      .change .meta { color: var(--text-muted); font-size: 0.8125rem; }
      .change .subject {
        color: var(--text-secondary); font-size: 0.8125rem; margin-top: 0.3rem;
        overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
      }
      .change .confirm { display: flex; gap: 0.5rem; align-items: center; }
      .change .confirm span { font-size: 0.8125rem; color: var(--accent-ink); }
      .avatar { width: 34px; height: 34px; border-radius: 50%; flex-shrink: 0; background: var(--bg-surface); }
      .banner {
        border-radius: var(--radius-md); padding: 0.85rem 1.1rem; margin-bottom: 1.25rem;
        font-size: 0.9rem; border: 1px solid var(--border);
      }
      .banner.ok { background: var(--ok-bg); border-color: var(--ok-border); color: var(--ok-text); }
      .banner.err { background: var(--err-bg); border-color: var(--err-border); color: var(--err-text); }
      .banner.info { background: var(--bg-surface); color: var(--text-secondary); }
      .center { text-align: center; padding: 3rem 1rem; color: var(--text-muted); }
      .signin { text-align: center; padding: 3.5rem 1rem; }
      .signin h1 { margin-bottom: 0.75rem; }
      .signin p { color: var(--text-muted); margin: 0 auto 1.75rem; max-width: 44ch; }
      .footnote { color: var(--text-muted); font-size: 0.8125rem; margin-top: 1.5rem; }
      .spinner {
        width: 22px; height: 22px; border: 2.5px solid var(--border);
        border-top-color: var(--accent); border-radius: 50%;
        animation: spin 0.7s linear infinite; display: inline-block; vertical-align: middle;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <div class="wrap">
      <header class="page">
        <p class="eyebrow">Content manager</p>
        <h1>Undo recent changes</h1>
        <p class="lede">
          Every change you publish is listed here. Press <strong>Undo</strong> on any
          one to put it back the way it was — the site updates within about a minute.
        </p>
      </header>

      <div id="app"></div>
    </div>

    <script>
      // -- Config -------------------------------------------------------------
      // ⚠️ AT HANDOVER: when the repo is transferred to Shubs, change REPO to
      //     'shubs-me/shubs-new-site' (must match repo: in /admin/config.yml).
      var REPO = 'shubs-me/shubs-new-site';
      var BRANCH = 'master';
      var API = 'https://api.github.com';
      var PER_PAGE = 25; // commits fetched per "page" of history (Show older loads more)

      // Friendly names for the files the CMS edits.
      var PATH_LABELS = {
        'content/home.json': 'Home page',
        'content/about.json': 'About page',
        'content/services.json': 'Services page',
        'content/contact.json': 'Contact page',
        'content/thinking.json': 'Thinking page',
        'content/legal.json': 'Legal Notice',
        'content/privacy.json': 'Privacy Policy',
        'content/cookies.json': 'Cookie Policy',
        'content/stats.json': 'Stats band',
        'content/testimonials.json': 'Testimonials',
        'content/ticker.json': 'Scrolling keywords',
        'content/process.json': 'Process steps',
      };
      function isContentPath(p) {
        return p.indexOf('content/') === 0 || p.indexOf('public/images/') === 0;
      }
      function labelForPath(p) {
        if (PATH_LABELS[p]) return PATH_LABELS[p];
        if (p.indexOf('public/images/') === 0) return 'Image';
        if (p.indexOf('content/') === 0) return p.split('/').pop();
        return p;
      }
      function labelsForFiles(files) {
        var seen = {}, out = [];
        files.forEach(function (f) {
          if (!isContentPath(f.filename)) return;
          var l = labelForPath(f.filename);
          if (!seen[l]) { seen[l] = 1; out.push(l); }
        });
        return out;
      }

      // -- Auth (reuses the Decap GitHub OAuth popup at /api/auth) -------------
      var token = sessionStorage.getItem('shubs_undo_token') || null;
      var app = document.getElementById('app');

      // History paging state (accumulates across "Show older changes").
      var rows = [];
      var nextPage = 1;
      var reachedEnd = false;
      var loadingMore = false;

      function login() {
        var popup = window.open('/api/auth', 'shubs-oauth', 'width=640,height=720');
        if (!popup) {
          renderSignin('Your browser blocked the pop-up. Allow pop-ups for this site and try again.');
          return;
        }
        function onMessage(e) {
          if (e.origin !== window.location.origin) return;
          var data = e.data;
          if (typeof data !== 'string') return;
          if (data === 'authorizing:github') {
            // Handshake: reply so the callback window sends us the token.
            popup.postMessage('authorizing:github', window.location.origin);
            return;
          }
          var m = data.match(/^authorization:github:(success|error):(.+)$/);
          if (!m) return;
          window.removeEventListener('message', onMessage);
          try { popup.close(); } catch (err) {}
          if (m[1] === 'success') {
            var payload = JSON.parse(m[2]);
            token = payload.token;
            sessionStorage.setItem('shubs_undo_token', token);
            loadChanges();
          } else {
            renderSignin('Sign-in failed. Please try again.');
          }
        }
        window.addEventListener('message', onMessage);
      }

      function signOut() {
        token = null;
        sessionStorage.removeItem('shubs_undo_token');
        renderSignin();
      }

      // -- GitHub API helper --------------------------------------------------
      function gh(path, opts) {
        opts = opts || {};
        var headers = {
          Authorization: 'Bearer ' + token,
          Accept: 'application/vnd.github+json',
          'X-GitHub-Api-Version': '2022-11-28',
        };
        if (opts.body) headers['Content-Type'] = 'application/json';
        return fetch(API + path, { method: opts.method || 'GET', headers: headers, body: opts.body }).then(
          function (res) {
            if (res.status === 401) { signOut(); throw new Error('Your sign-in expired — please sign in again.'); }
            if (!res.ok) {
              return res.text().then(function (t) {
                throw new Error('GitHub error ' + res.status + (t ? ': ' + t.slice(0, 200) : ''));
              });
            }
            return res.status === 204 ? null : res.json();
          }
        );
      }

      // -- Time formatting ----------------------------------------------------
      function relTime(iso) {
        var d = new Date(iso), s = (Date.now() - d.getTime()) / 1000;
        if (s < 60) return 'just now';
        var m = Math.floor(s / 60); if (m < 60) return m + (m === 1 ? ' minute' : ' minutes') + ' ago';
        var h = Math.floor(m / 60); if (h < 24) return h + (h === 1 ? ' hour' : ' hours') + ' ago';
        var days = Math.floor(h / 24); if (days < 7) return days + (days === 1 ? ' day' : ' days') + ' ago';
        return d.toLocaleDateString(undefined, { day: 'numeric', month: 'short', year: 'numeric' });
      }

      // -- Load + render the list of content changes --------------------------
      function loadChanges() {
        rows = [];
        nextPage = 1;
        reachedEnd = false;
        loadingMore = false;
        app.innerHTML = '<div class="center"><span class="spinner"></span><p>Loading recent changes…</p></div>';
        fetchPage().then(renderAll).catch(function (err) { renderError(err.message); });
      }

      // Fetch one page of commits, keep the content ones, append to `rows`.
      function fetchPage() {
        var list;
        return gh('/repos/' + REPO + '/commits?sha=' + BRANCH + '&per_page=' + PER_PAGE + '&page=' + nextPage)
          .then(function (commits) {
            if (!commits || !commits.length) { reachedEnd = true; return; }
            if (commits.length < PER_PAGE) reachedEnd = true;
            list = commits;
            // Fetch each commit's file list so we can keep only content changes.
            return Promise.all(
              commits.map(function (c) {
                return gh('/repos/' + REPO + '/commits/' + c.sha).catch(function () { return null; });
              })
            ).then(function (details) {
              for (var i = 0; i < list.length; i++) {
                var detail = details[i];
                if (!detail || !detail.files) continue;
                var labels = labelsForFiles(detail.files);
                if (!labels.length) continue; // skip code / system commits
                rows.push({
                  sha: list[i].sha,
                  labels: labels,
                  subject: (list[i].commit.message || '').split('\n')[0],
                  author: (list[i].commit.author && list[i].commit.author.name) || 'Unknown',
                  avatar: list[i].author && list[i].author.avatar_url,
                  date: list[i].commit.author && list[i].commit.author.date,
                  hasParent: detail.parents && detail.parents.length > 0,
                });
              }
              nextPage++;
            });
          });
      }

      function loadMore(btn) {
        if (loadingMore || reachedEnd) return;
        loadingMore = true;
        if (btn) { btn.disabled = true; btn.textContent = 'Loading…'; }
        fetchPage()
          .then(function () { loadingMore = false; renderAll(); })
          .catch(function (err) {
            loadingMore = false;
            showBanner('err', err.message);
            if (btn) { btn.disabled = false; btn.textContent = 'Show older changes'; }
          });
      }

      function el(tag, cls, text) {
        var n = document.createElement(tag);
        if (cls) n.className = cls;
        if (text != null) n.textContent = text;
        return n;
      }

      function renderAll() {
        app.innerHTML = '';

        var toolbar = el('div', 'toolbar');
        var refresh = el('button', null, '↻ Refresh');
        refresh.onclick = loadChanges;
        toolbar.appendChild(refresh);
        var spacer = el('div', 'spacer');
        toolbar.appendChild(spacer);
        var toCms = el('a', 'muted', '← Back to content manager');
        toCms.href = '/admin/';
        toolbar.appendChild(toCms);
        var out = el('a', 'muted', 'Sign out');
        out.href = '#'; out.style.marginLeft = '1rem';
        out.onclick = function (e) { e.preventDefault(); signOut(); };
        toolbar.appendChild(out);
        app.appendChild(toolbar);

        if (rows.length) {
          var ul = el('ul', 'changes');
          rows.forEach(function (row) { ul.appendChild(renderRow(row)); });
          app.appendChild(ul);
        } else if (reachedEnd) {
          app.appendChild(banner('info', 'No content changes found yet.'));
        } else {
          app.appendChild(banner('info', 'No content changes in the most recent updates — load older ones below.'));
        }

        // "Show older changes" pager — keeps loading further back in history.
        if (!reachedEnd) {
          var pager = el('div', 'toolbar');
          pager.style.justifyContent = 'center';
          var more = el('button', null, 'Show older changes');
          more.onclick = function () { loadMore(more); };
          pager.appendChild(more);
          app.appendChild(pager);
        }

        app.appendChild(
          foot(
            'Undo restores the files that change touched to how they were just before it. ' +
              'Only content changes are listed here — site/code updates are hidden. ' +
              'After an undo, the live site refreshes in about a minute.'
          )
        );
      }

      function renderRow(row) {
        var li = el('li', 'change');
        li.dataset.sha = row.sha;

        if (row.avatar) {
          var img = el('img', 'avatar');
          img.src = row.avatar; img.alt = '';
          li.appendChild(img);
        } else {
          li.appendChild(el('div', 'avatar'));
        }

        var body = el('div', 'body');
        body.appendChild(el('p', 'what', row.labels.join(' · ')));
        var meta = el('p', 'meta');
        meta.textContent = relTime(row.date) + ' · ' + row.author;
        meta.title = row.date ? new Date(row.date).toLocaleString() : '';
        body.appendChild(meta);
        if (row.subject) {
          var subj = el('p', 'subject', row.subject);
          subj.title = row.subject;
          body.appendChild(subj);
        }
        li.appendChild(body);

        var action = el('div', 'action');
        if (!row.hasParent) {
          action.appendChild(el('span', 'meta', 'Oldest change'));
        } else {
          var undo = el('button', 'btn-undo', 'Undo');
          undo.onclick = function () { confirmRow(li, row); };
          action.appendChild(undo);
        }
        li.appendChild(action);
        return li;
      }

      function confirmRow(li, row) {
        var action = li.querySelector('.action');
        action.innerHTML = '';
        var c = el('div', 'confirm');
        c.appendChild(el('span', null, 'Undo this?'));
        var yes = el('button', 'btn-primary', 'Yes, undo');
        var no = el('button', null, 'Cancel');
        no.onclick = function () { action.innerHTML = ''; var b = el('button', 'btn-undo', 'Undo'); b.onclick = function () { confirmRow(li, row); }; action.appendChild(b); };
        yes.onclick = function () { doUndo(li, row); };
        c.appendChild(yes); c.appendChild(no);
        action.appendChild(c);
      }

      function doUndo(li, row) {
        var action = li.querySelector('.action');
        action.innerHTML = '<span class="spinner"></span>';
        revertCommit(row.sha)
          .then(function () {
            showBanner('ok', '“' + row.labels.join(' · ') + '” has been put back. The live site will refresh in about a minute.');
            loadChanges();
          })
          .catch(function (err) {
            showBanner('err', 'Could not undo that change. ' + err.message);
            action.innerHTML = '';
            var b = el('button', 'btn-undo', 'Try again');
            b.onclick = function () { confirmRow(li, row); };
            action.appendChild(b);
          });
      }

      // -- The revert itself: restore each touched file to its parent state ---
      function encPath(p) { return p.split('/').map(encodeURIComponent).join('/'); }

      function parentBlobSha(path, parent) {
        return gh('/repos/' + REPO + '/contents/' + encPath(path) + '?ref=' + parent)
          .then(function (r) { return r && r.type === 'file' ? r.sha : null; })
          .catch(function () { return null; }); // 404 → didn't exist at parent
      }

      function revertCommit(sha) {
        var parent, files, headSha, baseTree;
        return gh('/repos/' + REPO + '/commits/' + sha)
          .then(function (detail) {
            if (!detail.parents || !detail.parents.length) throw new Error('It has no earlier version to restore.');
            parent = detail.parents[0].sha;
            files = (detail.files || []).filter(function (f) { return isContentPath(f.filename) || (f.previous_filename && isContentPath(f.previous_filename)); });
            if (!files.length) throw new Error('Nothing to restore.');
            return gh('/repos/' + REPO + '/git/ref/heads/' + BRANCH);
          })
          .then(function (ref) {
            headSha = ref.object.sha;
            return gh('/repos/' + REPO + '/git/commits/' + headSha);
          })
          .then(function (headCommit) {
            baseTree = headCommit.tree.sha;
            // Resolve the "before" blob for each touched file in parallel.
            var jobs = files.map(function (f) {
              if (f.status === 'added') {
                return Promise.resolve([{ path: f.filename, mode: '100644', type: 'blob', sha: null }]);
              }
              if (f.status === 'renamed' && f.previous_filename) {
                return Promise.all([
                  parentBlobSha(f.previous_filename, parent),
                  Promise.resolve(null),
                ]).then(function (r) {
                  var entries = [{ path: f.filename, mode: '100644', type: 'blob', sha: null }]; // remove new name
                  entries.push({ path: f.previous_filename, mode: '100644', type: 'blob', sha: r[0] }); // restore old (sha null = stays absent)
                  return entries;
                });
              }
              // modified / removed / changed → restore from parent
              return parentBlobSha(f.filename, parent).then(function (sha) {
                return [{ path: f.filename, mode: '100644', type: 'blob', sha: sha }];
              });
            });
            return Promise.all(jobs);
          })
          .then(function (entryGroups) {
            var tree = [];
            entryGroups.forEach(function (g) { g.forEach(function (e) { tree.push(e); }); });
            return gh('/repos/' + REPO + '/git/trees', {
              method: 'POST',
              body: JSON.stringify({ base_tree: baseTree, tree: tree }),
            });
          })
          .then(function (newTree) {
            return gh('/repos/' + REPO + '/git/commits', {
              method: 'POST',
              body: JSON.stringify({
                message: 'Undo content change (revert ' + sha.slice(0, 7) + ')',
                tree: newTree.sha,
                parents: [headSha],
              }),
            });
          })
          .then(function (newCommit) {
            return gh('/repos/' + REPO + '/git/refs/heads/' + BRANCH, {
              method: 'PATCH',
              body: JSON.stringify({ sha: newCommit.sha, force: false }),
            });
          });
      }

      // -- Small render helpers ----------------------------------------------
      function banner(kind, msg) { return el('div', 'banner ' + kind, msg); }
      function foot(msg) { return el('p', 'footnote', msg); }
      function showBanner(kind, msg) {
        var existing = app.querySelector('.banner.flash');
        if (existing) existing.remove();
        var b = banner(kind + ' flash', msg);
        app.insertBefore(b, app.firstChild);
        if (kind === 'ok') setTimeout(function () { b.remove(); }, 9000);
      }
      function renderError(msg) {
        app.innerHTML = '';
        app.appendChild(banner('err', msg));
        var retry = el('button', null, 'Try again');
        retry.onclick = loadChanges;
        app.appendChild(retry);
      }
      function renderSignin(msg) {
        app.innerHTML = '';
        var box = el('div', 'signin');
        if (msg) box.appendChild(banner('err', msg));
        box.appendChild(el('p', null, 'Sign in with the same GitHub account you use for the content manager to see and undo recent changes.'));
        var btn = el('button', 'btn-primary', 'Sign in with GitHub');
        btn.onclick = login;
        box.appendChild(btn);
        var toCms = el('p', null, '');
        var link = el('a', 'muted', '← Back to content manager');
        link.href = '/admin/';
        toCms.appendChild(link);
        box.appendChild(toCms);
        app.appendChild(box);
      }

      // -- Boot ---------------------------------------------------------------
      if (token) loadChanges();
      else renderSignin();
    </script>
  </body>
</html>
