# Decap CMS configuration.
# Visual content editor available at /admin once an OAuth provider is connected.
# See MAINTENANCE.md for the one-time setup (auth) and day-to-day editing guide.

backend:
  name: github
  # ⚠️ AT HANDOVER: once the repo is transferred to Shubs, change this line to:
  #     repo: shubs-me/shubs-new-site
  # (Do it at cutover, not before — that repo doesn't exist until the transfer.)
  repo: samwoodhouse1982/shubs-new-site
  branch: master
  # OAuth handled by this site's own /api/auth + /api/callback routes.
  # base_url must be the live origin the site is served from.
  base_url: https://www.shubs.me
  auth_endpoint: /api/auth

# The "S." brand mark shown on the CMS login screen.
logo_url: /admin/logo.svg

# Where uploaded images are stored and how they're referenced on the site.
media_folder: public/images
public_folder: /images

# Friendlier editor: open a PR-free direct commit workflow.
publish_mode: simple

collections:
