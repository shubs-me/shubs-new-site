                  - { name: post, label: Heading end, widget: string, required: false }
              - { name: lead, label: Lead paragraph, widget: text }
              - { name: ctaPrimaryLabel, label: Primary button text, widget: string }
              - { name: ctaPrimaryHref, label: Primary button link, widget: string }
              - { name: ctaSecondaryLabel, label: Secondary button text, widget: string }
              - { name: ctaSecondaryHref, label: Secondary button link, widget: string }
