<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <title>Content Manager · Shubs Upadhyay</title>
    <!-- Explicit absolute path so the config loads whether the page is served
         at /admin or /admin/ -->
    <link href="/admin/config.yml" type="text/yaml" rel="cms-config-url" />

    <!-- Brand the Decap CMS chrome to match the site (warm near-black + clay
         pink). Decap uses hashed class names, but its Emotion labels keep the
         component name as a suffix, so [class*="Name"] selectors are stable
         enough to target. Best-effort: only colours the login screen, top bar
         and primary buttons; the editing forms keep Decap's readable light UI. -->
    <style>
      :root {
        --shubs-ink: #15120e;
        --shubs-clay: #fc5f84;
        --shubs-clay-deep: #e23e69;
        --shubs-cream: #efe9dc;
      }

      /* --- Login screen --- */
      [class*="AuthenticationPage"] {
        background-color: var(--shubs-ink) !important;
        background-image: none !important;
      }
      [class*="LoginButton"] {
        background-color: var(--shubs-clay) !important;
        color: var(--shubs-ink) !important;
        border-radius: 100px !important;
      }
      [class*="LoginButton"]:hover {
        background-color: var(--shubs-clay-deep) !important;
      }

      /* --- Top app bar --- */
      [class*="AppHeader"] {
        background-color: var(--shubs-ink) !important;
        background-image: none !important;
      }
      [class*="AppHeader"] a,
      [class*="AppHeaderNavLink"],
      [class*="AppHeaderButton"] {
        color: var(--shubs-cream) !important;
      }
      [class*="AppHeaderNavLink"][class*="active"],
      [class*="AppHeaderNavLink"]:hover {
        color: #fff !important;
      }

      /* --- Primary action buttons (publish / save / new) --- */
      [class*="PublishButton"],
      [class*="SaveButton"],
      [class*="DropdownButton"][class*="PublishedToolbarButton"],
      [class*="AppHeaderActions"] button[class*="DropdownButton"] {
        background-color: var(--shubs-clay) !important;
        color: var(--shubs-ink) !important;
      }
      [class*="PublishButton"]:hover,
      [class*="SaveButton"]:hover {
        background-color: var(--shubs-clay-deep) !important;
      }
    </style>
  </head>
  <body>
    <!-- Decap CMS: visual editor for the site's content.
         Loads from a CDN; commits edits back to GitHub. -->
    <script src="https://unpkg.com/decap-cms@^3.8.4/dist/decap-cms.js"></script>
    <script>
      // Floating link to the "Undo recent changes" page. Injected directly so it
      // doesn't depend on Decap internals, and re-added if the CMS re-renders.
      (function () {
        function addUndoLink() {
          if (document.getElementById('undo-fab')) return;
          if (!document.body) return;
          var a = document.createElement('a');
          a.id = 'undo-fab';
          a.href = '/admin/undo';
          a.textContent = '↶ Undo recent changes';
          a.setAttribute('aria-label', 'Undo recent changes');
          a.style.cssText = [
            'position:fixed', 'left:16px', 'bottom:16px', 'z-index:99999',
            'background:#FC5F84', 'color:#15120E',
            'font:600 13px/1 -apple-system,BlinkMacSystemFont,system-ui,sans-serif',
            'padding:11px 16px', 'border-radius:100px',
            'box-shadow:0 6px 20px rgba(21,18,14,0.28)', 'text-decoration:none',
            'display:inline-flex', 'align-items:center', 'gap:6px',
          ].join(';');
          document.body.appendChild(a);
        }
        if (document.readyState !== 'loading') addUndoLink();
        else document.addEventListener('DOMContentLoaded', addUndoLink);
        // Decap re-renders the app shell; keep the button present.
        if (document.body) {
          new MutationObserver(addUndoLink).observe(document.body, { childList: true });
        }
      })();
    </script>
  </body>
</html>
